name: Deploy Weather Release

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

concurrency:
  group: deploy-weather-release
  cancel-in-progress: false

env:
  JAVA_VERSION: "21"
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST || '43.242.200.25' }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER || 'root' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || vars.DEPLOY_PORT || '58753' }}
  DEPLOY_DIR: ${{ secrets.BACKEND_DEPLOY_DIR || '/www/osh/008-mcp' }}
  BACKEND_JAR_NAME: ${{ vars.BACKEND_JAR_NAME || 'mcp-server-weather-0.0.1-SNAPSHOT.jar' }}
  DOCKER_COMPOSE_DIR: ${{ vars.DOCKER_COMPOSE_DIR || '/opt/docker-apps' }}
  BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME || 'mcp-server-weather' }}
  COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'compose.yaml' }}
  COMPOSE_SERVICE: ${{ vars.COMPOSE_SERVICE || 'weather-mcp' }}

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Detect latest release branch
        id: latest_release
        run: |
          git fetch --prune --prune-tags origin '+refs/heads/release/*:refs/remotes/origin/release/*'
          latest_branch="$(git branch -r --list 'origin/release/*' | sed 's#^[[:space:]]*origin/##' | sort -V | tail -n 1)"
          echo "latest_branch=$latest_branch" >> "$GITHUB_OUTPUT"
          echo "Latest release branch: $latest_branch"

      - name: Skip non-latest release branch
        if: github.event_name == 'push' && github.ref_name != steps.latest_release.outputs.latest_branch
        run: |
          echo "Current branch ${{ github.ref_name }} is not the latest release branch."
          echo "Latest release branch is ${{ steps.latest_release.outputs.latest_branch }}."
          exit 0

      - name: Setup JDK
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build backend jar
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        run: mvn clean verify

      - name: Validate jar output
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        run: |
          jar_file="$(find target -maxdepth 1 -name '*.jar' | head -n 1)"
          test -n "$jar_file"
          test -f "$jar_file"
          unzip -t "$jar_file" >/tmp/weather-jar-check.log
          sha256sum "$jar_file" | tee /tmp/weather-jar.sha256

      - name: Validate deployment settings
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        run: |
          test -n "$DEPLOY_HOST" || { echo "DEPLOY_HOST is required"; exit 1; }
          test -n "$DEPLOY_DIR" || { echo "DEPLOY_DIR is required"; exit 1; }

      - name: Setup SSH agent
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        run: |
          mkdir -p ~/.ssh
          for i in 1 2 3; do
            ssh-keyscan -p "$DEPLOY_PORT" -T 15 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying..."
            sleep 3
          done
          test -s ~/.ssh/known_hosts || { echo "ERROR: known_hosts is empty"; exit 1; }

      - name: Sync source to server
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        run: |
          ssh -o ConnectTimeout=30 -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_DIR'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'target/' \
            -e "ssh -o ConnectTimeout=30 -p $DEPLOY_PORT" \
            ./ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/"

      - name: Restart backend service
        if: github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch
        run: |
          ssh -o ConnectTimeout=30 -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_DIR' && docker compose -f '$COMPOSE_FILE' up -d --build '$COMPOSE_SERVICE' && sleep 20 && docker compose -f '$COMPOSE_FILE' ps '$COMPOSE_SERVICE'"

      - name: Show backend logs
        if: always() && (github.event_name != 'push' || github.ref_name == steps.latest_release.outputs.latest_branch)
        run: |
          ssh -o ConnectTimeout=30 -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_DIR' && docker compose -f '$COMPOSE_FILE' logs --tail 80 '$COMPOSE_SERVICE' 2>&1 || true" || true
